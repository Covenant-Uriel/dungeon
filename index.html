<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dungeon</title>
  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f5f5f5;
      font-family: Arial, sans-serif;
    }
    canvas {
      border: 2px solid #222;
      background: white;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="800" height="600"></canvas>

  <script>
    const canvas = document.getElementById(\"gameCanvas\");
    const ctx = canvas.getContext(\"2d\");

    const room = {
      doors: [
        { x: 370, y: 0, w: 60, h: 20 },
        { x: 780, y: 270, w: 20, h: 60 }
      ],
      obstacles: [],
      chests: [],
      enemies: []
    };

    const player = {
      x: 100, y: 100, size: 30, speed: 5, hp: 100, attackRange: 60
    };

    const keys = {};
    let score = 0;

    document.addEventListener(\"keydown\", e => keys[e.key] = true);
    document.addEventListener(\"keyup\", e => keys[e.key] = false);
    canvas.addEventListener(\"click\", attack);

    function rectsCollide(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function generateNewRoom() {
      player.x = 100; player.y = 100;
      room.obstacles = Array.from({ length: 3 }, () => ({
        x: Math.random() * 600 + 50,
        y: Math.random() * 400 + 50,
        w: 60, h: 60
      }));
      room.chests = [{ x: Math.random() * 700 + 20, y: Math.random() * 500 + 20, w: 30, h: 30 }];
      room.enemies = Array.from({ length: 2 }, () => ({
        x: Math.random() * 700 + 20,
        y: Math.random() * 500 + 20,
        w: 30, h: 30,
        hp: 30
      }));
    }

    function drawRoom() {
      ctx.strokeRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = \"brown\";
      room.doors.forEach(d => ctx.fillRect(d.x, d.y, d.w, d.h));
      ctx.fillStyle = \"gray\";
      room.obstacles.forEach(o => ctx.fillRect(o.x, o.y, o.w, o.h));
      ctx.fillStyle = \"gold\";
      room.chests.forEach(c => ctx.fillRect(c.x, c.y, c.w, c.h));
      ctx.fillStyle = \"red\";
      room.enemies.forEach(e => ctx.fillRect(e.x, e.y, e.w, e.h));
    }

    function drawPlayer() {
      ctx.fillStyle = \"black\";
      ctx.fillRect(player.x, player.y, player.size, player.size);
      ctx.fillText(`HP: ${player.hp}  Score: ${score}`, 10, 20);
    }

    function movePlayer() {
      let newX = player.x, newY = player.y;
      if (keys[\"ArrowUp\"] || keys[\"w\"]) newY -= player.speed;
      if (keys[\"ArrowDown\"] || keys[\"s\"]) newY += player.speed;
      if (keys[\"ArrowLeft\"] || keys[\"a\"]) newX -= player.speed;
      if (keys[\"ArrowRight\"] || keys[\"d\"]) newX += player.speed;
      newX = Math.max(0, Math.min(canvas.width - player.size, newX));
      newY = Math.max(0, Math.min(canvas.height - player.size, newY));

      const future = { x: newX, y: newY, w: player.size, h: player.size };
      const hitObstacle = room.obstacles.some(obs => rectsCollide(future, obs));
      if (!hitObstacle) { player.x = newX; player.y = newY; }
    }

    function moveEnemies() {
      room.enemies.forEach(enemy => {
        const dx = player.x - enemy.x;
        const dy = player.y - enemy.y;
        const dist = Math.hypot(dx, dy) || 1;
        enemy.x += dx / dist;
        enemy.y += dy / dist;

        if (rectsCollide({ x: player.x, y: player.y, w: player.size, h: player.size }, enemy)) {
          player.hp = Math.max(0, player.hp - 0.1);
        }
      });
    }

    function attack() {
      room.enemies = room.enemies.filter(enemy => {
        const dist = Math.hypot(player.x - enemy.x, player.y - enemy.y);
        if (dist <= player.attackRange) {
          score += 10;
          return false;
        }
        return true;
      });
    }

    function collectChest() {
      room.chests = room.chests.filter(chest => {
        const got = rectsCollide({ x: player.x, y: player.y, w: player.size, h: player.size }, chest);
        if (got) score += 20;
        return !got;
      });
    }

    function checkDoorCollision() {
      const p = { x: player.x, y: player.y, w: player.size, h: player.size };
      if (room.doors.some(d => rectsCollide(p, d))) {
        score += 5;
        generateNewRoom();
      }
    }

    function gameLoop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      movePlayer();
      moveEnemies();
      collectChest();
      checkDoorCollision();
      drawRoom();
      drawPlayer();
      requestAnimationFrame(gameLoop);
    }

    generateNewRoom();
    gameLoop();
  </script>
</body>
</html>
